services:
  mysql:
    image: mysql:8.4
    container_name: blog-prod-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blog_app_apis}
      MYSQL_USER: ${DB_USERNAME:-blog_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: blog-prod-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-blog_app_apis}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: ${DB_USERNAME:-blog_user}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-18000000}
      CORS_ALLOWED_ORIGINS: ${PUBLIC_FRONTEND_ORIGIN}
      SERVER_FORWARD_HEADERS_STRATEGY: framework
    volumes:
      - uploaded_images:/app/images
    expose:
      - "9090"
    restart: unless-stopped

  frontend:
    build:
      context: ../../microservices-frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${PUBLIC_API_BASE_URL}
    container_name: blog-prod-frontend
    expose:
      - "80"
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: blog-prod-nginx
    depends_on:
      - backend
      - frontend
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --spider http://localhost/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  mysql_data:
  uploaded_images:
