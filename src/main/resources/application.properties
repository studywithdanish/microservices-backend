spring.application.name=blog-app-apis
server.port=9090

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.open-in-view=false
spring.profiles.default=dev

app.jwt.secret=${JWT_SECRET:change-this-dev-secret-before-production-change-this-dev-secret-before-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:18000000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
project.image=images/

logging.level.org.springframework.security=info

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true

info.app.name=Blogging Application API
info.app.description=Container-ready Spring Boot backend for a blogging platform
info.app.version=1.0.0
