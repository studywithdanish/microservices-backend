spring.application.name=blog-app-apis
#server.port=5000
server.port=9090

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

app.jwt.secret=${JWT_SECRET:change-this-dev-secret-before-production-change-this-dev-secret-before-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:18000000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}


#File Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
project.image=images/

logging.level.org.springframework.security=info

spring.profiles.active=dev
#spring.profiles.active=prod



